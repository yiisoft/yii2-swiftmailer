name: build

on: [push, pull_request]

env:
    DEFAULT_COMPOSER_FLAGS: "--prefer-dist --no-interaction --no-progress --optimize-autoloader --ansi"

permissions:
  contents: read
jobs:
    phpunit:
        name: PHP ${{ matrix.php }} on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest]
                php: ['7.2', '7.3', '7.4', '8.0']

        steps:
            - name: Install sendmail
              run: sudo apt-get install -y sendmail
            - name: Checkout
              uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5
              with:
                persist-credentials: false
            - name: Install PHP
              uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45
              with:
                  php-version: ${{ matrix.php }}
            - name: Get composer cache directory
              id: composer-cache
              run: echo "::set-output name=dir::$(composer config cache-files-dir)"
            - name: Cache composer dependencies
              uses: actions/cache@f5ce41475b483ad7581884324a6eca9f48f8dcc7
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-
            - name: Install dependencies
              run: composer update $DEFAULT_COMPOSER_FLAGS
            - name: Run unit tests with coverage
              run: vendor/bin/phpunit --verbose --coverage-clover=coverage.clover --colors=always
              if: matrix.php == '7.1'
            - name: Run unit tests without coverage
              run: vendor/bin/phpunit --verbose --colors=always
              if: matrix.php != '7.1'
            - name: Upload code coverage
              run: |
                  wget https://scrutinizer-ci.com/ocular.phar
                  php ocular.phar code-coverage:upload --format=php-clover coverage.clover
              if: matrix.php == '7.1'
              continue-on-error: true # if is fork
